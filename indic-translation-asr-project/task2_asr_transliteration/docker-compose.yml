version: "3.9"

services:
  asr-system:
    build:
      context: .
      dockerfile: Dockerfile
    image: asr-system:latest
    container_name: asr_transliteration_app
    ports:
      - "7860:7860"
    environment:
      - PYTHONUNBUFFERED=1
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    volumes:
      # Persist model cache across restarts
      - whisper_cache:/root/.cache/whisper
      # Persist output files
      - ./outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  whisper_cache:
    driver: local
